<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>modal-accessible</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="p-modal-accessible">
    <button type="button" id="open-modal-btn" class="btn">モーダルを開く</button>

    <div id="accessible-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-modal="true"
      aria-labelledby="modal-title" aria-describedby="modal-desc">
      <div class="modal-content" role="document">
        <button type="button" class="modal-close-icon" data-modal-close aria-label="閉じる">
          &times;
        </button>

        <h2 id="modal-title">アクセシブル・モーダル</h2>
        <p id="modal-desc">
          このモーダルは Esc キーで閉じられ、Tab キーによるフォーカス移動も
          モーダル内部に閉じ込められます（フォーカストラップ）。
        </p>

        <div class="modal-actions">
          <button type="button" class="btn btn--ghost" data-modal-close>キャンセル</button>
          <button type="button" class="btn" data-modal-close>OK</button>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
